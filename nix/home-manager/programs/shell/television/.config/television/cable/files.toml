[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat"]

[source]
command = [
  # 1. No hidden, respect ignore.
  """fd --type file \
  --no-hidden \
  --ignore \
  --ignore-file "${XDG_CONFIG_HOME:-$HOME/.config}/television/ignore" \
  --follow \
  """,

  # 2. Hidden, respect ignore, manual excludes.
  """fd --type file \
  --hidden \
  --ignore \
  --ignore-file "${XDG_CONFIG_HOME:-$HOME/.config}/television/ignore" \
  --follow \
  """,

  # 3. Hidden, no ignore, manual excludes.
  """fd --type file \
  --hidden \
  --no-ignore \
  --ignore-file "${XDG_CONFIG_HOME:-$HOME/.config}/television/ignore" \
  --follow \
  """,

  # 4. Hidden, no ignore.
  """fd --type file \
  --hidden \
  --no-ignore \
  --follow \
  """,
]
frecency = false
shell = "bash"

[preview]
command = "bat -n --color=always '{}'"

[keybindings]
ctrl-o = "actions:edit"
ctrl-v = "actions:goto_parent_dir"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "${EDITOR:-vim} '{}'"
shell = "bash"
# "fork" if you want to return to tv afterwards, "execute" otherwise.
mode = "fork"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"
