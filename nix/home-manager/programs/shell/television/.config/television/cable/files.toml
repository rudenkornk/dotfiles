[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat"]

[source]
command = [
  """fd --type file \
     --exclude .ansible \
     --exclude .bun \
     --exclude .cache \
     --exclude .cargo \
     --exclude .dbus \
     --exclude .fzf \
     --exclude .git \
     --exclude .gnupg \
     --exclude .gradle \
     --exclude .mozilla \
     --exclude .mypy_cache \
     --exclude .npm \
     --exclude .ruff_cache \
     --exclude .rustup \
     --exclude .cursor \
     --exclude .nix-defexpr \
     --exclude __pycache__ \
     --exclude site-packages \
     --follow \
     --no-ignore \
     --hidden
  """,
  """fd --type file \
     --follow \
     --no-ignore \
     --hidden
  """,
  """fd --type file \
     --follow \
     --ignore \
     --no-hidden
  """,
]

[preview]
command = "bat -n --color=always '{}'"

[keybindings]
ctrl-o = "actions:edit"
ctrl-v = "actions:goto_parent_dir"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "${EDITOR:-vim} '{}'"
shell = "bash"
# "fork" if you want to return to tv afterwards, "execute" otherwise.
mode = "fork"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"
